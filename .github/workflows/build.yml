name: Build Static HTML & Markdown

on:
  push:
    paths:
      - 'data.js'
      - 'build.js'
      - '.github/workflows/build.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-static
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Render index.html + comparison.md from data.js
        run: node build.js

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html comparison.md
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Rebuild static HTML & comparison.md [automated]"
            git push
          fi
