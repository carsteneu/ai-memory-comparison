name: Update star history chart

on:
  schedule:
    - cron: '0 6 * * *'  # Daily 06:00 UTC = 08:00 CEST
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: star-history
  cancel-in-progress: false

jobs:
  update-chart:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install gh CLI
        run: |
          curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg | sudo dd of=/usr/share/keyrings/githubcli-archive-keyring.gpg
          echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" | sudo tee /etc/apt/sources.list.d/github-cli.list > /dev/null
          sudo apt update && sudo apt install gh -y

      - name: Clone mystarhistory tool
        run: git clone --depth 1 https://github.com/carsteneu/mystarhistory.git /tmp/mystarhistory

      - name: Generate star history SVG
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python /tmp/mystarhistory/mystarhistory.py --repo ${{ github.repository }} --output star-history.svg --color "#dd4528"

      - name: Commit if changed
        run: |
          if git diff --quiet star-history.svg; then
            echo "No changes, skipping commit"
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add star-history.svg
            git commit -m "chore: update star history chart [skip ci]"
            git push
          fi
